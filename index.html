<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>말따먹기 정복</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bg-construction {
            background-image: url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-100 h-full overflow-hidden flex items-center justify-center p-2 bg-construction">
    
    <div class="w-full max-w-sm h-full max-h-[750px] bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl border border-white/50 flex flex-col overflow-hidden">
        
        <!-- 헤더 -->
        <div class="py-8 text-center border-b border-white/50 bg-white/50">
            <h1 class="text-3xl font-black text-indigo-900 tracking-tight mb-1">말따먹기 정복</h1>
            <p class="text-gray-600 text-sm font-medium">토목기사 실기 핵심 마스터</p>
        </div>

        <!-- 메뉴 그리드 -->
        <div class="p-6 grid grid-cols-2 gap-4">
            <a href="토질및기초.html" class="flex flex-col items-center justify-center text-center p-6 bg-indigo-600 rounded-3xl text-white hover:bg-indigo-700 transition active:scale-95 shadow-lg shadow-indigo-200">
                <span class="text-4xl mb-2">🏗️</span>
                <span class="font-bold text-sm leading-tight">토질역학<br>및 기초</span>
            </a>
            <a href="지반조사및시공.html" class="flex flex-col items-center justify-center text-center p-6 bg-blue-500 rounded-3xl text-white hover:bg-blue-600 transition active:scale-95 shadow-lg shadow-blue-200">
                <span class="text-4xl mb-2">🔍</span>
                <span class="font-bold text-sm leading-tight">지반조사<br>및 시공</span>
            </a>
            <a href="연약지반개량.html" class="flex flex-col items-center justify-center text-center p-6 bg-teal-500 rounded-3xl text-white hover:bg-teal-600 transition active:scale-95 shadow-lg shadow-teal-200">
                <span class="text-4xl mb-2">🏔️</span>
                <span class="font-bold text-sm leading-tight">연약지반<br>& 터널/암반</span>
            </a>
            <a href="발파.html" class="flex flex-col items-center justify-center text-center p-6 bg-orange-500 rounded-3xl text-white hover:bg-orange-600 transition active:scale-95 shadow-lg shadow-orange-200">
                <span class="text-4xl mb-2">🚜</span>
                <span class="font-bold text-sm leading-tight">발파, 토공<br>& 품질관리</span>
            </a>
        </div>

        <!-- 설정 영역 -->
        <div class="px-6 pb-6 flex-1">
            <!-- 시험일 한 줄 배치 -->
            <div class="flex items-center gap-3 mb-4">
                <span class="text-xs font-bold text-gray-500 whitespace-nowrap">시험일 설정</span>
                <input type="date" id="date-input" onchange="saveData()" class="flex-1 p-2 text-xs rounded-xl border border-gray-200 bg-white/50 outline-none">
            </div>
            
            <!-- D-Day 및 각오 -->
            <div id="d-day-display" class="text-center text-indigo-900 font-black text-xl mb-2"></div>
            <input type="text" id="goal-input" oninput="saveData()" placeholder="오늘의 각오 한 줄" class="w-full text-center p-2 text-sm rounded-xl border border-gray-200 bg-white/50 outline-none">
        </div>

        <!-- 푸터 -->
        <div class="p-4 text-center border-t border-white/50">
            <p class="text-indigo-400 text-[10px] font-bold">제작자: 국민대불주먹</p>
        </div>
    </div>

    <script>
        const goalInput = document.getElementById('goal-input');
        const dateInput = document.getElementById('date-input');
        const dDayDisplay = document.getElementById('d-day-display');

        function saveData() {
            localStorage.setItem('userGoal', goalInput.value);
            localStorage.setItem('targetDate', dateInput.value);
            calculateDDay();
        }

        function calculateDDay() {
            if (!dateInput.value) {
                dDayDisplay.innerText = "";
                return;
            }
            const targetDate = new Date(dateInput.value);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diff = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
            
            if (diff > 0) dDayDisplay.innerText = `D-${diff}`;
            else if (diff === 0) dDayDisplay.innerText = `D-Day!`;
            else dDayDisplay.innerText = `D+${Math.abs(diff)}`;
        }

        window.onload = () => {
            goalInput.value = localStorage.getItem('userGoal') || "";
            dateInput.value = localStorage.getItem('targetDate') || "";
            calculateDDay();
        };
    </script>
</body>
</html>
