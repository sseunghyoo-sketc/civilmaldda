<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연약지반 및 터널/암반 마스터 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .correct-border { border: 2px solid #22c55e !important; background-color: #f0fdf4; }
        .incorrect-border { border: 2px solid #ef4444 !important; background-color: #fef2f2; }
        .slide-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 h-full overflow-hidden flex items-center justify-center p-2">
    
    <div class="w-full max-w-sm h-full max-h-[700px] bg-white rounded-3xl shadow-xl border border-gray-100 flex flex-col overflow-hidden">
        
        <div class="p-4 text-center border-b border-gray-50">
            <h1 class="text-lg font-bold text-gray-800">연약지반/터널 마스터</h1>
        </div>

        <div id="quiz-viewport" class="flex-1 p-5 overflow-y-auto slide-enter">
            <!-- 시작 화면을 Flex로 정중앙 배치 -->
            <div id="start-screen" class="flex flex-col items-center justify-center h-full text-center space-y-6">
                <div>
                    <div class="text-6xl mb-4">🏔️</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-1">토목기사 실기 대비</h2>
                    <p class="text-gray-500 text-sm">연약지반/터널 26문제 학습하기</p>
                </div>
                <button onclick="startQuiz()" class="w-3/4 bg-indigo-600 text-white py-4 rounded-2xl hover:bg-indigo-700 transition font-bold shadow-lg active:scale-95">퀴즈 시작하기</button>
                <p id="daily-quote" class="text-gray-400 italic text-xs font-medium leading-relaxed max-w-[250px]"></p>
            </div>
        </div>

        <div id="nav-controls" class="hidden p-4 border-t border-gray-100">
            <div class="flex justify-between items-center">
                <button onclick="prevQuestion()" id="prev-btn" class="bg-gray-100 text-gray-700 px-5 py-2 rounded-xl hover:bg-gray-200 transition font-bold text-sm disabled:opacity-30">이전</button>
                <span id="progress" class="text-gray-400 font-bold text-sm">1 / 26</span>
                <button onclick="nextQuestion()" id="next-btn" class="bg-gray-100 text-gray-700 px-5 py-2 rounded-xl hover:bg-gray-200 transition font-bold text-sm disabled:opacity-30">다음</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { id: 1, q: "연약지반의 공학적 문제 3가지는?", o: ["침하", "전단파괴", "측방유동", "투수", "동결"], ans: [0, 1, 2], exp: "침하, 전단파괴, 측방유동" },
            { id: 2, q: "연약지반 개량공법 종류 4가지는?", o: ["압밀", "치환", "다짐", "고결", "폭파"], ans: [0, 1, 2, 3], exp: "압밀, 치환, 다짐, 고결(안정처리)" },
            { id: 3, q: "Sand mat의 역할 3가지는?", o: ["배수재 연결", "작업장 확보", "균등하중 재하", "압밀촉진", "강도증가"], ans: [0, 1, 2], exp: "배수재 연결, 작업면 확보, 균등하중 재하" },
            { id: 4, q: "Sand drain 타설방법 3가지는?", o: ["압축공기식", "워터젯식", "회전식", "충격식", "진동식"], ans: [0, 1, 2], exp: "압축공기식, 워터젯식, 회전식" },
            { id: 5, q: "Paper Drain이 Sand Drain보다 유리한 점 3가지는?", o: ["공기단축", "공사비 저렴", "시공간편", "투수성 우수", "장비 소형"], ans: [0, 1, 2, 4], exp: "공기단축, 공사비저렴, 시공간편, 장비소형" },
            { id: 6, q: "강제치환공법의 단점은?", o: ["지반교란", "불완전한 치환", "경제성 낮음", "장비복잡", "공기길어짐"], ans: [0, 1], exp: "지반교란, 불완전한 치환" },
            { id: 7, q: "약액주입재 확인시험 방법은?", o: ["일축압축시험", "겔타임측정", "점도측정", "삼축압축", "투수시험"], ans: [0, 1, 2], exp: "일축압축강도, 겔타임, 점도 측정" },
            { id: 8, q: "약액주입재 구비조건 3가지는?", o: ["주입성", "지수성", "강도성", "침투성", "팽창성"], ans: [0, 1, 2], exp: "주입성(침투성), 지수성, 강도성" },
            { id: 9, q: "절리와 단층의 정의는?", o: ["절리:변위없음, 단층:변위있음", "절리:변위있음, 단층:변위없음", "둘다 변위있음", "둘다 변위없음", "상관없음"], ans: [0], exp: "절리:변위 없는 균열, 단층:변위 있는 균열" },
            { id: 10, q: "암반 사면 파괴형태 4가지는?", o: ["평면파괴", "쐐기파괴", "전도파괴", "원호파괴", "낙석"], ans: [0, 1, 2, 3], exp: "평면, 쐐기, 전도, 원호파괴" },
            { id: 11, q: "암반 현지지압 계산법은?", o: ["수직/수평응력 측정", "간극수압 측정", "일축압축", "RMR분류", "시추"], ans: [0], exp: "수직응력(오버버든), 수평응력(지압계수)" },
            { id: 12, q: "암반 공학적 분류 방법 4가지는?", o: ["RMR", "Q-system", "RSR", "SR", "SPT"], ans: [0, 1, 2, 3], exp: "RMR, Q-system, RSR, SR(Rock Mass Rating 등)" },
            { id: 13, q: "RMR 평가요소 4가지는?", o: ["강도", "RQD", "절리간격", "지하수상태", "투수"], ans: [0, 1, 2, 3], exp: "암석강도, RQD, 절리간격, 지하수 상태" },
            { id: 14, q: "터널 2차원 해석방법 2가지는?", o: ["강성저하법", "이완하중법", "유한요소법", "탄성법", "실험법"], ans: [0, 1], exp: "강성저하법, 이완하중법(하중전이법)" },
            { id: 15, q: "터널 용어 정의(스프링라인, 버력)?", o: ["스프링:곡선시작선, 버력:굴착암석", "스프링:최상부, 버력:철근", "스프링:최하부, 버력:콘크리트", "상관없음"], ans: [0], exp: "스프링라인:아치부와 측벽 경계, 버력:굴착된 암석" },
            { id: 16, q: "여굴 발생 원인/감소 방안?", o: ["원인:불량발파, 감소:정밀발파", "원인:지질양호, 감소:무작정발파", "관계없음"], ans: [0], exp: "원인:지질불량/발파불량, 감소:정밀발파/숏크리트" },
            { id: 17, q: "터널 단면형상 분류 3가지는?", o: ["원형", "말굽형", "상자형", "삼각형", "원추형"], ans: [0, 1, 2], exp: "원형, 말굽형, 상자형" },
            { id: 18, q: "강지보재의 종류 3가지는?", o: ["H형강", "격자지보", "강관지보", "철근", "말뚝"], ans: [0, 1, 2], exp: "H형강, 격자지보, 강관지보" },
            { id: 19, q: "숏크리트 기능 3가지는?", o: ["지반지지", "암반탈락방지", "응력분산", "지하수차단", "하중지지"], ans: [0, 1, 2], exp: "지반지지, 암반탈락방지, 응력분산" },
            { id: 20, q: "숏크리트 건식/습식 차이?", o: ["건식:현장믹스/습식:공장믹스", "건식:공장믹스/습식:현장믹스", "차이없음"], ans: [0], exp: "건식:현장믹스(분진많음), 습식:공장믹스(품질균일)" },
            { id: 21, q: "록볼트 역할 3가지는?", o: ["빔효과", "아치형성", "내압효과", "지지력강화", "인발"], ans: [0, 1, 2], exp: "빔효과, 아치형성, 내압효과" },
            { id: 22, q: "록볼트 인발시험 목적 2가지는?", o: ["정착력확인", "설계값비교", "강도측정", "길이측정", "변위측정"], ans: [0, 1], exp: "정착력 확인, 설계값 비교" },
            { id: 23, q: "터널 보조공법 3가지는?", o: ["파이프로프", "미니파이프", "주입공법", "동결공법", "개착"], ans: [0, 2, 3], exp: "파이프루프, 주입공법, 동결공법" },
            { id: 24, q: "TBM 공법 장점 2가지는?", o: ["공기단축", "소음진동적음", "고가비용", "장비무거움", "운전복잡"], ans: [0, 1], exp: "공기단축, 소음/진동 적음" },
            { id: 25, q: "기존도로 하부 통과공법 2가지는?", o: ["파이프루프", "프론트잭킹", "개착", "발파", "말뚝"], ans: [0, 1], exp: "파이프루프, 프론트잭킹" },
            { id: 26, q: "터널 방재설비 종류 3가지는?", o: ["옥내소화전", "비상조명", "제연설비", "배수설비", "환기"], ans: [0, 1, 2], exp: "옥내소화전, 비상조명, 제연설비" }
        ];

        let currentIndex = 0;
        const quotes = [
            "정확한 지반 조사가 견고한 구조물을 만듭니다.",
            "토목의 시작은 땅을 읽는 것에서부터입니다.",
            "기초가 흔들리면 전체가 무너집니다.",
            "철저한 시공 관리만이 안전을 보장합니다.",
            "데이터 기반의 판단이 공학자의 자질입니다."
        ];

        function shuffle(array) {
            let curr = array.length, randomIndex;
            while (curr != 0) {
                randomIndex = Math.floor(Math.random() * curr);
                curr--;
                [array[curr], array[randomIndex]] = [array[randomIndex], array[curr]];
            }
            return array;
        }

        quizData.forEach(q => {
            let items = q.o.map((text, idx) => ({ text, isAns: q.ans.includes(idx) }));
            items = shuffle(items);
            q.shuffledOptions = items.map(item => item.text);
            q.shuffledAns = [];
            items.forEach((item, idx) => { if (item.isAns) q.shuffledAns.push(idx); });
        });

        window.onload = () => {
            const quoteEl = document.getElementById('daily-quote');
            if(quoteEl) quoteEl.innerText = `❝ ${quotes[Math.floor(Math.random() * quotes.length)]} ❞`;
        };

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('nav-controls').classList.remove('hidden');
            renderCurrentQuestion();
        }

        function renderCurrentQuestion() {
            const q = quizData[currentIndex];
            const viewport = document.getElementById('quiz-viewport');
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === quizData.length - 1;

            viewport.innerHTML = `
                <h3 class="text-gray-800 font-bold mb-4 text-base leading-snug">${currentIndex + 1}. ${q.q}</h3>
                <div id="options-container" class="space-y-2">
                    ${q.shuffledOptions.map((opt, idx) => `
                        <label class="flex items-center p-3 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-50 transition active:bg-gray-100">
                            <input type="checkbox" data-idx="${idx}" class="w-5 h-5 text-indigo-600 rounded-md border-gray-300 mr-3">
                            <span class="text-gray-700 text-sm font-medium">${opt}</span>
                        </label>
                    `).join('')}
                </div>
                <button onclick="toggleAnswer()" class="mt-5 w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition font-bold shadow-md active:scale-95 text-sm">정답 확인</button>
                <div id="expl-container" class="hidden mt-4 p-3 bg-indigo-50 text-indigo-900 rounded-xl text-xs border border-indigo-100 leading-relaxed">
                    <strong>💡 정답 핵심 요약:</strong><br>${q.exp}
                </div>
            `;
        }

        function toggleAnswer() {
            const q = quizData[currentIndex];
            const container = document.getElementById('options-container');
            const checkboxes = container.querySelectorAll('input');
            const expl = document.getElementById('expl-container');
            
            if (!expl.classList.contains('hidden')) {
                expl.classList.add('hidden');
                checkboxes.forEach(cb => {
                    cb.checked = false;
                    cb.parentElement.classList.remove('correct-border', 'incorrect-border');
                    cb.parentElement.classList.add('border-gray-100');
                });
                return;
            }

            checkboxes.forEach((cb) => {
                const idx = parseInt(cb.getAttribute('data-idx'));
                cb.parentElement.classList.remove('correct-border', 'incorrect-border');
                if (q.shuffledAns.includes(idx)) {
                    cb.parentElement.classList.add('correct-border');
                } else if (cb.checked && !q.shuffledAns.includes(idx)) {
                    cb.parentElement.classList.add('incorrect-border');
                }
            });
            expl.classList.remove('hidden');
        }

        function prevQuestion() { if(currentIndex > 0) { currentIndex--; renderCurrentQuestion(); } }
        function nextQuestion() { if(currentIndex < quizData.length - 1) { currentIndex++; renderCurrentQuestion(); } }
    </script>
</body>
</html>
```eof
